<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КОВЧЕГ — Игрок</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0d0d1a;
      color: white;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      margin: 0;
    }

    h2 {
      margin-bottom: 10px;
    }

    .status {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    button {
      font-size: 1.2rem;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background-color: #ff1744;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.3s;
    }

    button:disabled {
      background-color: #555;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h2>Игрок <span id="playerNumber"></span></h2>
  <div class="status">Статус: <span id="playerStatus">Загрузка...</span></div>
  <button id="voteBtn" onclick="vote()">Голосовать</button>

  <div id="meetingSection" style="display:none; margin-top: 20px;">
    <h2>🛑 Собрание!</h2>
    <p id="meetingTarget"></p>
    <button id="voteKickBtn">Исключить</button>
    <button id="voteSkipBtn">Пропустить</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="firebase.js"></script>
  <script>
    const playerNumber = localStorage.getItem('playerNumber');
    if (!playerNumber) window.location.href = 'index.html';
    document.getElementById('playerNumber').innerText = playerNumber;

    const statusEl = document.getElementById('playerStatus');
    const voteBtn = document.getElementById('voteBtn');
    let lastVotedAt = 0;

    const db = firebase.database();
    const playerRef = db.ref('players/' + playerNumber);

    // Обновление статуса игрока в реальном времени
    playerRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        statusEl.innerText = data.status === 'dead' ? 'Мёртв' : 'Жив';
        voteBtn.disabled = (data.status === 'dead' || Date.now() - data.votedAt < 5 * 60 * 1000);
        lastVotedAt = data.votedAt || 0;
      } else {
        statusEl.innerText = 'Ошибка';
        voteBtn.disabled = true;
      }
    });

    function vote() {
      const voteTarget = prompt('Против кого голосуешь? Введите номер игрока (1–60):');
      if (!voteTarget || voteTarget < 1 || voteTarget > 60) return alert('Некорректный номер.');

      db.ref('players/' + voteTarget + '/votesAgainst').transaction((votes) => {
        if (!votes) votes = [];
        if (!votes.includes(playerNumber)) votes.push(playerNumber);
        return votes;
      });

      playerRef.update({ votedAt: Date.now() });
      voteBtn.disabled = true;
    }

    // ====== Секция собрания ======
    const meetingSection = document.getElementById("meetingSection");
    const meetingTarget = document.getElementById("meetingTarget");

    db.ref("meetings").on("value", (snap) => {
      const meeting = snap.val();
      if (meeting && meeting.active) {
        if (meeting.votes && meeting.votes[playerNumber]) {
          meetingSection.style.display = "none"; // Уже голосовал
        } else {
          meetingSection.style.display = "block";
          meetingTarget.innerText = `Цель: Игрок №${meeting.target}`;
        }
      } else {
        meetingSection.style.display = "none";
      }
    });

    document.getElementById("voteKickBtn").onclick = () => {
      db.ref(`meetings/votes/${playerNumber}`).set("kick");
      meetingSection.style.display = "none";
    };

    document.getElementById("voteSkipBtn").onclick = () => {
      db.ref(`meetings/votes/${playerNumber}`).set("skip");
      meetingSection.style.display = "none";
    };
  </script>
</body>
</html>
